name = "guidebook"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
#  本地开发：wrangler dev --local
#  生产部署前：
#    1. 运行 `npx wrangler d1 create guidebook-db` 获取真实 database_id 替换下面占位符
#    2. 运行 `npx wrangler r2 bucket create guidebook-files` 创建 R2 bucket
#    3. 运行 `npx wrangler secret put JWT_SECRET` 设置 JWT 密钥
#    4. 运行 `npx wrangler secret put ADMIN_PASSWORD_HASH` 设置管理员密码哈希
#    5. 修改 [vars] FRONTEND_URL 为生产前端域名
# ============================================

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "guidebook-db"
# 部署前替换为真实 ID：npx wrangler d1 create guidebook-db
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# R2 对象存储 — 存说明书文件
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "guidebook-files"

# 环境变量（非敏感）
[vars]
# 生产环境改为 https://guidebook.pages.dev 或自定义域名
FRONTEND_URL = "http://localhost:5173"
# JWT_SECRET 和 ADMIN_PASSWORD_HASH 用 .dev.vars 文件（本地）或
# `wrangler secret put`（生产）设置，不要写在这里
# ADMIN_PASSWORD_HASH 格式：salt:hash（hex），使用 `node scripts/generate-hash.mjs <密码>` 生成
