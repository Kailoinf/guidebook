name = "guidebook"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ============================================
#  本地开发：wrangler dev --local
#  生产部署前修改 database_id 为真实值，并用
#  `wrangler secret put` 设置 JWT_SECRET / ADMIN_PASSWORD
# ============================================

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "guidebook-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# R2 对象存储 — 存说明书文件
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "guidebook-files"

# 环境变量（非敏感）
[vars]
FRONTEND_URL = "http://localhost:5173"
# JWT_SECRET 和 ADMIN_PASSWORD 用 .dev.vars 文件（本地）或
# `wrangler secret put`（生产）设置，不要写在这里
