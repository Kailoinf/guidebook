name = "guidebook"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
#  此文件任何人 clone 后无需修改，直接可用。
#  所有配置都在 Cloudflare 控制台环境变量中设置：
#
#    D1_DATABASE_ID       — CF 控制台环境变量
#    FRONTEND_URL         — CF 控制台环境变量
#    JWT_SECRET           — CF 控制台环境变量（Secret）
#    ADMIN_PASSWORD_HASH  — CF 控制台环境变量（Secret）
#
#  本地开发：wrangler dev（配合 .dev.vars 文件，本地 D1 自动模拟）
#  生产部署：Cloudflare Git 集成（Workers Builds）自动部署
# ============================================

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "guidebook-db"
database_id = "${D1_DATABASE_ID}"
migrations_dir = "migrations"

# R2 对象存储 — 存说明书文件
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "guidebook-files"
