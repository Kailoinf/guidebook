name = "guidebook"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
#  所有环境变量 / 密钥都在 Cloudflare 控制台或 .dev.vars 中设置
#  此文件只声明资源绑定（D1 / R2），不包含任何 key 或敏感配置
#
#  本地开发：wrangler dev --local（配合 .dev.vars 文件）
#  生产部署前：
#    1. npx wrangler d1 create guidebook-db → 把返回的 database_id 填到下面
#    2. npx wrangler r2 bucket create guidebook-files
#    3. 在 CF 控制台 → Workers → Settings → Variables 设置环境变量：
#         FRONTEND_URL        = https://你的前端域名
#         JWT_SECRET          = 随机密钥（openssl rand -base64 32）
#         ADMIN_PASSWORD_HASH = node scripts/generate-hash.mjs 生成的哈希
#       或用命令：npx wrangler secret put <变量名>
# ============================================

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "guidebook-db"
# 部署前替换为真实 ID：npx wrangler d1 create guidebook-db
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# R2 对象存储 — 存说明书文件
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "guidebook-files"
